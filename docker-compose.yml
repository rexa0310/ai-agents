services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag-qdrant
    ports:
      - "6333:6333"   # REST API + web dashboard (http://localhost:6333/dashboard)
      - "6334:6334"   # gRPC API
    volumes:
      - ./qdrant_storage:/qdrant/storage
    restart: unless-stopped

  chroma:
    image: chromadb/chroma:latest
    container_name: rag-chroma
    ports:
      - "8001:8000"   # host 8001 -> container 8000 (avoids uvicorn's 8000)
    volumes:
      - ./chroma_storage:/data
    restart: unless-stopped

  mongo:
    image: mongo:latest
    container_name: rag-mongo
    ports:
      - "27017:27017"
    volumes:
      - ./mongo_storage:/data/db
    restart: unless-stopped
